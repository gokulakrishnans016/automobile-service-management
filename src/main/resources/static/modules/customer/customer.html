<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Management</title>

    <link rel="stylesheet" href="/modules/customer/customer.css">


    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="layout">
    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2><i class="fa-solid fa-car"></i> DriveSync</h2>

        <ul class="menu">

            <li onclick="go('dashboard')">
                <i class="fa-solid fa-house"></i>
                <span>Dashboard</span>
            </li>

            <li onclick="go('vehicle')">
                <i class="fa-solid fa-car-side"></i>
                <span>Vehicles</span>
            </li>

            <li onclick="go('customer')" class="active">
                <i class="fa-solid fa-users"></i>
                <span>Customers</span>
            </li>

            <li onclick="go('sales')"  >
                <i class="fa-solid fa-chart-line"></i>
                <span>Sales</span>
            </li>

            <li onclick="go('payment')">
                <i class="fa-solid fa-credit-card"></i>
                <span>Payments</span>
            </li>

            <li onclick="go('service')">
                <i class="fa-solid fa-wrench"></i>
                <span>Service</span>
            </li>

            <li class="menu-item logout" onclick="logout()">
                <i class="fa-solid fa-right-from-bracket"></i>
                <span>Logout</span>
            </li>

        </ul>
    </div>

    <!-- MAIN -->
    <div class="main">

        <div class="top-bar">
            <h1><i class="fa-solid fa-users"></i> Customer Management</h1>
            <button class="add-btn" onclick="openModal()">+ Add Customer</button>
        </div>

        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search customers...">
        </div>

        <!-- TABLE -->
        <div class="table-card">
            <table>
                <thead>
                <tr>
                    <th>Name</th>
                    <th>Phone</th>
                    <th>City</th>
                    <th>License</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody id="customerTable"></tbody>
            </table>
        </div>

    </div>
</div>

<!-- MODAL -->
<div id="customerModal" class="modal hidden">
    <div class="modal-content">

        <h2 id="modalTitle">Add Customer</h2>

        <input type="hidden" id="customerId">

        <input id="name" placeholder="Full Name">
        <input id="age" type="number" placeholder="Age">
        <input id="dateOfBirth" type="date">

        <select id="gender">
            <option value="">Select Gender</option>
            <option>MALE</option>
            <option>FEMALE</option>
        </select>

        <input id="email" placeholder="Email">
        <input id="phone" placeholder="Phone (10 digits)">

        <input id="address" placeholder="Address">
        <input id="city" placeholder="City">
        <input id="state" placeholder="State">
        <input id="pincode" placeholder="Pincode">

        <input id="license" placeholder="Driving License Number">

        <div class="btn-group">
            <button onclick="saveCustomer()">Save Customer</button>
            <button onclick="closeModal()" class="cancel">Cancel</button>
        </div>

    </div>
</div>

<div id="toast" class="toast hidden"></div>

<script src="/js/app.js"></script>
<script src="/modules/customer/customer.js"></script>

</body>
</html>
