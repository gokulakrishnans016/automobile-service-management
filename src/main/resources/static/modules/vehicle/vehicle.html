<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vehicle Management</title>

    <link rel="stylesheet" href="/modules/vehicle/vehicle.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2><i class="fa-solid fa-car"></i> DriveSync</h2>

        <ul class="menu">
            <li onclick="go('dashboard')"><i class="fa-solid fa-house"></i> Dashboard</li>
            <li class="active" onclick="go('vehicle')"><i class="fa-solid fa-car-side"></i> Vehicles</li>
            <li onclick="go('customer')"><i class="fa-solid fa-users"></i> Customers</li>
            <li onclick="go('sales')"><i class="fa-solid fa-chart-line"></i> Sales</li>
            <li onclick="go('payment')"><i class="fa-solid fa-credit-card"></i> Payments</li>
            <li onclick="go('service')"><i class="fa-solid fa-wrench"></i> Service</li>
            <li class="menu-item logout" onclick="logout()">
                <i class="fa-solid fa-right-from-bracket"></i> Logout
            </li>
        </ul>
    </div>

    <!-- MAIN -->
    <div class="main">

        <div class="top-bar">
            <h1><i class="fa-solid fa-car"></i> Vehicle Management</h1>
            <button class="add-btn" onclick="openModal()">+ Add Vehicle</button>
        </div>

        <!-- SEARCH -->
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search vehicles...">
        </div>

        <div class="filter-bar">
            <button id="btnAvailable" class="active" onclick="showSection('available')">
                Available Vehicles
            </button>
            <button id="btnSold" onclick="showSection('sold')">
                Sold Vehicles
            </button>
        </div>

        <!-- ================= AVAILABLE ================= -->
        <div id="availableSection">

            <div class="table-card">
                <table>
                    <thead>
                    <tr>
                        <th>Name</th>
                        <th>Brand</th>
                        <th>Model</th>
                        <th>Price</th>
                        <th>Stock</th>
                        <th>Fuel</th>
                        <th>Year</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                    </thead>

                    <tbody id="vehicleTable"></tbody>
                </table>

                <div class="pagination" id="availablePagination"></div>
            </div>

        </div>

        <!-- ================= SOLD ================= -->
        <div id="soldSection" style="display:none;">

            <div class="table-card">
                <table>
                    <thead>
                    <tr>
                        <th>Name</th>
                        <th>Brand</th>
                        <th>Model</th>
                        <th>Customer</th>
                        <th>Price</th>
                        <th>Fuel</th>
                        <th>Year</th>
                        <th>Status</th>
                    </tr>
                    </thead>

                    <tbody id="soldTable"></tbody>
                </table>

                <div class="pagination" id="soldPagination"></div>
            </div>

        </div>

    </div>
</div>

<!-- MODAL -->
<div id="vehicleModal" class="modal hidden">
    <div class="modal-content">

        <h2 id="modalTitle">Add Vehicle</h2>

        <input type="hidden" id="vehicleId">

        <input id="name" placeholder="Vehicle Name">
        <input id="brand" placeholder="Brand">
        <input id="model" placeholder="Model">

        <input id="price" type="number" placeholder="Price">
        <input id="stock" type="number" placeholder="Stock Quantity">

        <label>Fuel Type</label>
        <select id="fuel">
            <option value="">Select Fuel Type</option>
            <option value="Petrol">Petrol</option>
            <option value="Diesel">Diesel</option>
            <option value="Electric">Electric</option>
        </select>

        <label>Status</label>
        <select id="status">
            <option value="AVAILABLE">Available</option>
            <option value="SOLD">Sold</option>
        </select>

        <input id="year" type="number" placeholder="Manufacture Year">
        <input id="reg" placeholder="Registration Number">

        <button id="saveBtn" onclick="addVehicle()">Save Vehicle</button>
        <button onclick="closeModal()" class="cancel">Cancel</button>

    </div>
</div>

<!-- TOAST -->
<div id="toast" class="toast hidden"></div>

<script src="/js/app.js"></script>
<script src="/modules/vehicle/vehicle.js"></script>

</body>
</html>
