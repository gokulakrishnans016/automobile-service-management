<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sales Management</title>

    <link rel="stylesheet" href="/modules/sales/sales.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2><i class="fa-solid fa-car"></i> DriveSync</h2>

        <ul class="menu">

            <li onclick="go('dashboard')">
                <i class="fa-solid fa-house"></i>
                <span>Dashboard</span>
            </li>

            <li onclick="go('vehicle')">
                <i class="fa-solid fa-car-side"></i>
                <span>Vehicles</span>
            </li>

            <li onclick="go('customer')">
                <i class="fa-solid fa-users"></i>
                <span>Customers</span>
            </li>

            <li onclick="go('sales')"  class="active">
                <i class="fa-solid fa-chart-line"></i>
                <span>Sales</span>
            </li>

            <li onclick="go('payment')">
                <i class="fa-solid fa-credit-card"></i>
                <span>Payments</span>
            </li>

            <li onclick="go('service')">
                <i class="fa-solid fa-wrench"></i>
                <span>Service</span>
            </li>

            <li class="menu-item logout" onclick="logout()">
                <i class="fa-solid fa-right-from-bracket"></i>
                <span>Logout</span>
            </li>

        </ul>
    </div>

    <!-- MAIN -->
    <div class="main">

        <div class="top-bar">
            <h1><i class="fa-solid fa-chart-line"></i> Sales Management</h1>

            <button class="add-btn" onclick="openModal()">+ Add Sale</button>
        </div>

        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search by Customer or Sale ID...">
        </div>


        <!-- TABLE -->
        <div class="table-card">
            <table>
                <thead>
                <tr>
                    <th>Vehicle</th>
                    <th>Customer</th>
                    <th>Price</th>
                    <th>Status</th>
                    <th>Delivery</th>
                    <th>Action</th>
                </tr>
                </thead>

                <tbody id="salesTable"></tbody>
            </table>
        </div>

    </div>
</div>

<!-- MODAL -->
<div id="saleModal" class="modal hidden">

    <div class="modal-content">

        <h2>Add Sale</h2>

        <input type="hidden" id="saleId">

        <!-- VEHICLE -->
        <label>Vehicle</label>
        <select id="vehicleId" onchange="autoFillPrice()"></select>

        <!-- CUSTOMER -->
        <label>Customer</label>
        <select id="customerId"></select>

        <!-- PRICE -->
        <input id="salePrice" type="number" placeholder="Sale Price">

        <input id="discount" type="number" placeholder="Discount">
        <input id="taxAmount" type="number" placeholder="Tax Amount">

        <!-- STATUS DROPDOWN -->
        <select id="status">
            <option value="COMPLETED">Completed</option>
            <option value="PENDING">Pending</option>
        </select>

        <input id="deliveryDate" type="date">

        <button onclick="addSale()">Save Sale</button>
        <button onclick="closeModal()" class="cancel">Cancel</button>

    </div>
</div>

<script src="/js/app.js"></script>
<script src="/modules/sales/sales.js"></script>

</body>
</html>
