<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Payment Management</title>

    <link rel="stylesheet" href="/modules/payment/payment.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2><i class="fa-solid fa-car"></i> DriveSync</h2>

        <ul class="menu">

            <li onclick="go('dashboard')" >
                <i class="fa-solid fa-house"></i>
                <span>Dashboard</span>
            </li>

            <li onclick="go('vehicle')">
                <i class="fa-solid fa-car-side"></i>
                <span>Vehicles</span>
            </li>

            <li onclick="go('customer')">
                <i class="fa-solid fa-users"></i>
                <span>Customers</span>
            </li>

            <li onclick="go('sales')"  >
                <i class="fa-solid fa-chart-line"></i>
                <span>Sales</span>
            </li>

            <li onclick="go('payment')" class="active">
                <i class="fa-solid fa-credit-card"></i>
                <span>Payments</span>
            </li>

            <li onclick="go('service')">
                <i class="fa-solid fa-wrench"></i>
                <span>Service</span>
            </li>

            <li class="menu-item logout" onclick="logout()">
                <i class="fa-solid fa-right-from-bracket"></i>
                <span>Logout</span>
            </li>

        </ul>
    </div>


    <!-- MAIN -->
    <div class="main">

        <div class="top-bar">
            <h1>💳 Payment Management</h1>
            <button id="addBtn">+ Add Payment</button>
        </div>

        <div class="search-bar">
            <input id="searchBox" placeholder="Search by Customer Name / ID or Sale ID">
        </div>

        <h2 class="section-title">Payment Records</h2>
        <div id="paymentContainer"></div>

    </div>
</div>

<!-- MODAL -->
<div id="modal" class="modal hidden">
    <div class="modal-box">

        <h2>Add Payment</h2>

        <select id="saleSelect"></select>

        <div id="detailsBox"></div>

        <input id="amount" type="number" placeholder="Paying Amount">

        <select id="method">
            <option value="">Select Method</option>
            <option>CASH</option>
            <option>UPI</option>
            <option>CARD</option>
        </select>

        <input id="txn" placeholder="Transaction ID">

        <button id="saveBtn">Save</button>
        <button id="closeBtn">Cancel</button>

    </div>
</div>

<script src="/js/app.js"></script>
<script src="/modules/payment/payment.js"></script>

</body>
</html>
